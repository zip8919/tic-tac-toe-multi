name = "tic-tac-toe"
main = "src/index.ts"
compatibility_date = "2025-06-08"
# 部署前取消下行注释并填入你的 account_id
# account_id = ""

[assets]
directory = "../frontend"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[durable_objects.bindings]]
name = "REGISTRY"
class_name = "Registry"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom", "Registry"]
