<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>井字棋 - 多模式对战</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 主菜单 -->
    <div id="page-lobby" class="page active">
      <h1 class="title">井字棋</h1>
      <p class="subtitle">选择游戏模式</p>
      <div id="mode-list"></div>
      <div id="play-type-list" class="hidden"></div>
      <button id="btn-rules" class="btn-link">查看游戏规则</button>
    </div>

    <!-- 在线大厅 -->
    <div id="page-online" class="page">
      <h2>在线联机</h2>
      <div class="online-section">
        <h3>创建房间</h3>
        <input type="text" id="create-nickname" placeholder="你的昵称" maxlength="20">
        <button id="btn-create" class="btn-primary">创建房间</button>
        <div id="create-result" class="result-box hidden"></div>
      </div>
      <div class="online-divider"><span>或</span></div>
      <div class="online-section">
        <h3>加入房间</h3>
        <input type="text" id="join-nickname" placeholder="你的昵称" maxlength="20">
        <input type="text" id="join-room-id" placeholder="房间号（6位）" maxlength="6" style="text-transform:uppercase">
        <button id="btn-join" class="btn-primary">加入房间</button>
        <div id="join-error" class="error-text hidden"></div>
      </div>
      <button id="btn-online-back" class="btn-link">返回主菜单</button>
    </div>

    <!-- 对局界面 -->
    <div id="page-game" class="page">
      <div id="game-status-bar">
        <div id="status-text">等待中...</div>
        <div id="player-info">
          <span id="player-x-info" class="player-tag player-x">✕ <span class="player-name"></span></span>
          <span class="vs-text">VS</span>
          <span id="player-o-info" class="player-tag player-o">◯ <span class="player-name"></span></span>
        </div>
        <div id="turn-indicator"></div>
      </div>
      <div id="board-area">
        <div id="board-container"></div>
        <div id="zoom-btns">
          <button id="btn-zoom-in" title="放大">＋</button>
          <button id="btn-zoom-out" title="缩小">－</button>
        </div>
      </div>
      <button id="btn-quit" class="btn-danger">退出对局</button>
    </div>

    <!-- 规则页面 -->
    <div id="page-rules" class="page">
      <h2>游戏规则</h2>
      <div id="rules-content"></div>
      <button id="btn-rules-back" class="btn-link">返回主菜单</button>
    </div>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
